<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Brawl Stars Draft</title>

<style>
body {
    margin: 0;
    font-family: system-ui, Arial;
    font-size: 20px; /* global scale */
    background: radial-gradient(circle at top, #1a1a1a, #0d0d0d);
    color: #fff;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 50px 20px;
}

h1 { 
    margin-bottom: 6px; 
    font-size: 34px;
}

p { 
    opacity: 0.7; 
    margin-bottom: 25px;
    font-size: 18px;
}

.autocomplete-box { 
    position: relative; 
    width: 380px; /* slightly bigger */
}

input {
    width: 100%;
    padding: 14px;
    border-radius: 12px;
    border: 1px solid #333;
    background: #151515;
    color: white;
    outline: none;
    font-size: 18px;
}

button {
    margin-top: 14px;
    padding: 12px 22px;
    border-radius: 12px;
    border: none;
    background: #2a2a2a;
    color: white;
    cursor: pointer;
    font-size: 18px;
    transition: 0.15s;
}

button:hover {
    background: #3a3a3a;
}

.suggestions {
    position: absolute;
    top: 50px;
    width: 100%;
    background: #1a1a1a;
    border: 1px solid #333;
    border-radius: 12px;
    overflow: hidden;
    z-index: 10;
}

.suggestions div {
    padding: 12px;
    cursor: pointer;
    font-size: 17px;
}

.suggestions div.active,
.suggestions div:hover { 
    background: #2c2c2c; 
}

.shared-box {
    margin-top: 30px;
    width: 100%;
    max-width: 750px;
    background: #111;
    border: 1px solid #222;
    border-radius: 14px;
    padding: 16px;
}

.shared-title {
    font-weight: 700;
    margin-bottom: 12px;
    font-size: 24px;
}

.shared-item {
    margin: 6px 0;
    font-size: 20px;
}

.result {
    margin-top: 25px;
    width: 100%;
    max-width: 750px;
}

.row {
    display: grid;
    grid-template-columns: 180px 1fr;
    gap: 16px;
    padding: 14px 16px;
    margin-bottom: 12px;
    background: #151515;
    border: 1px solid #222;
    border-radius: 14px;
}

.name { 
    font-weight: 700;
    font-size: 24px;
}

.list { 
    font-size: 20px; 
    line-height: 1.7; 
}

/* class colors */
.thrower { color: #FFA500; }
.tank { color: #FF0000; }
.assassin { color: #00cc66; } /* slightly brighter green */
.antitank { color: #aaaaaa; }
.support { color: #bb66ff; }
.sniper { color: #ffff66; }
.control { color: #4da6ff; }
</style>
</head>

<body>

	<div class="autocomplete-box">
	<input id="input" placeholder="Brawler Name"
	oninput="showSuggestions()"
	onkeydown="handleKeyDown(event)">
	<div id="suggestions" class="suggestions"></div>
	</div>

	<button onclick="findCounters()">Search</button>

</div>

<div id="shared" class="shared-box" style="display:none;"></div>
<div id="result" class="result"></div>

  /* SNIPER */

  /* CONTROL */
  "amber":"control","meeple":"control","leon":"control","pam":"control","bo":"control","pearl":"control","gene":"control","stu":"control","janet":"control","penny":"control","jessie":"control","squeak":"control","eve":"control","lola":"control","najia":"control","bonnie":"control","mr p":"control"
};

const classOrder = [
	  "antitank",
	  "sniper",
	  "assassin",
	  "thrower",
	  "tank",
	  "control",
	  "support",	  
	];

let selectedIndex = -1;

/* =========================
   HELPERS
========================= */
function normalize(s) {
    return (s || "")
        .toLowerCase()
        .replace(/\s+/g, " ")
        .trim();
}

function capitalize(w) {
    return w.charAt(0).toUpperCase() + w.slice(1);
}

function getClassColor(name) {
    return brawlerClass[normalize(name)] || "";
}

function colorize(name) {
    const cls = getClassColor(name);
    return `<span class="${cls}">${capitalize(name)}</span>`;
}

/* =========================
   AUTOCOMPLETE
========================= */
function showSuggestions() {
    const input = document.getElementById("input");
    const box = document.getElementById("suggestions");

    const current = normalize(input.value.split(",").pop());

    box.innerHTML = "";
    selectedIndex = -1;

    if (!current) return;

    const matches = Object.keys(data)
        .filter(n => n.startsWith(current))
        .sort()
        .slice(0, 6);

    matches.forEach(name => {
        const div = document.createElement("div");
        div.innerHTML = colorize(name);
        div.onclick = () => selectSuggestion(name);
        box.appendChild(div);
    });
}

function selectSuggestion(name) {
    const input = document.getElementById("input");

    let parts = input.value.split(",");
    parts[parts.length - 1] = " " + name;

    input.value = parts.join(",").replace(/^ /, "") + ", ";

    document.getElementById("suggestions").innerHTML = "";
    selectedIndex = -1;
}

/* =========================
   KEY HANDLING
========================= */
function handleKeyDown(e) {
    const box = document.getElementById("suggestions");
    const items = box.querySelectorAll("div");

    if (!items.length && e.key === "Enter") {
        findCounters();
        return;
    }

    if (e.key === "ArrowDown") {
        selectedIndex = (selectedIndex + 1) % items.length;
        updateActive(items);
        e.preventDefault();
    }

    if (e.key === "ArrowUp") {
        selectedIndex = (selectedIndex - 1 + items.length) % items.length;
        updateActive(items);
        e.preventDefault();
    }

    if (e.key === "Enter") {
        e.preventDefault();

        const chosen =
            selectedIndex >= 0
                ? items[selectedIndex].textContent.toLowerCase()
                : items[0].textContent.toLowerCase();

        selectSuggestion(chosen);
    }
}

function updateActive(items) {
    items.forEach((el, i) => {
        el.classList.toggle("active", i === selectedIndex);
    });
}

/* =========================
   CORE LOGIC (FIXED)
========================= */
function sortByClassThenAlpha(arr) {
    return [...arr].sort((a, b) => {
        const classA = getClassColor(a);
        const classB = getClassColor(b);

        const indexA = classOrder.indexOf(classA);
        const indexB = classOrder.indexOf(classB);

        // 1. Class order
        if (indexA !== indexB) {
            return indexA - indexB;
        }

        // 2. Alphabetical
        return a.localeCompare(b);
    });
}

function findCounters() {
	document.getElementById("topUI").style.display = "none";
    const inputRaw = document.getElementById("input").value;
    const resultDiv = document.getElementById("result");
    const counterBox = document.getElementById("shared");

    resultDiv.innerHTML = "";
    counterBox.innerHTML = "";
    counterBox.style.display = "none";

    const brawlers = inputRaw
        .split(",")
        .map(b => normalize(b))
        .filter(Boolean);

    const selectedSet = new Set(brawlers);

    let allCounters = [];

    for (const b of brawlers) {
        if (data[b]) {
            allCounters.push(
                ...(data[b].main || []),
                ...(data[b].alt || [])
            );
        }
    }

    const freq = {};
    allCounters.forEach(c => {
        const key = normalize(c);
        freq[key] = (freq[key] || 0) + 1;
    });
	
    const counterList = Object.keys(freq).sort((a, b) => {
		const classA = getClassColor(a);
		const classB = getClassColor(b);

		const indexA = classOrder.indexOf(classA);
		const indexB = classOrder.indexOf(classB);

		// 1. Sort by class (color group)
		if (indexA !== indexB) {
			return indexA - indexB;
		}

		// 2. Then alphabetical
		return a.localeCompare(b);
	});
		
	const filteredCounters = counterList.filter(c => freq[c] >= 2);

    if (counterList.length) {
        counterBox.style.display = "block";

        counterBox.innerHTML = `
            <div class="shared-title">Counters</div>
            ${filteredCounters.map(c => {

				const isCrossed = selectedSet.has(c);

				return `<div class="shared-item">
					${isCrossed ? `<s>${colorize(c)}</s>` : colorize(c)}
					(x${freq[c]})
				</div>`;
			}).join("")}
        `;
    }

    brawlers.forEach(b => {
        if (!data[b]) {
            resultDiv.innerHTML += `
            <div class="row">
                <div class="name">${capitalize(b)}</div>
                <div class="list">Not found</div>
            </div>`;
            return;
        }

        const mainSorted = sortByClassThenAlpha(data[b].main || []);
		const altSorted = sortByClassThenAlpha(data[b].alt || []);

		const main = mainSorted.map(colorize).join(", ");
		const alt = altSorted.map(colorize).join(", ");

        resultDiv.innerHTML += `
        <div class="row">
            <div class="name">${colorize(b)}</div>
            <div class="list">${main || "None"} / ${alt || "None"}</div>
        </div>`;
    });
}

/* =========================
   INIT
========================= */
window.addEventListener("load", () => {
    document.getElementById("input").focus();
});

</script>
