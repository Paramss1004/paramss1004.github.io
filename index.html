<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Brawl Stars Draft</title>

<style>
:root {
    --ui-width: 750px;
}

/* =========================
   GLOBAL LAYOUT
========================= */
body {
    margin: 0;
    font-family: system-ui, Arial;
    font-size: 20px;
    background: radial-gradient(circle at top, #1a1a1a, #0d0d0d);
    color: #fff;

    display: flex;
    flex-direction: column;
    align-items: center;

    padding: 30px 20px;
    gap: 18px;
}

/* =========================
   HEADER
========================= */
#topUI {
    width: var(--ui-width);
    display: flex;
    flex-direction: column;
    align-items: stretch;
}

h1 {
    margin-bottom: 6px;
    font-size: 34px;
}

p {
    opacity: 0.7;
    margin-bottom: 10px;
    font-size: 18px;
    width: 100%;
}

/* =========================
   INPUT + AUTOCOMPLETE
========================= */
.autocomplete-box {
    position: relative;
    width: 100%;
}

input {
    width: 100%;
    padding: 14px;
    border-radius: 12px;
    border: 1px solid #333;
    background: #151515;
    color: white;
    outline: none;
    font-size: 18px;
}

input:focus {
    border-color: #4da6ff;
    box-shadow: 0 0 0 2px rgba(77,166,255,0.2);
}

.suggestions {
    position: absolute;
    top: 50px;
    width: 100%;
    background: #1a1a1a;
    border: 1px solid #333;
    border-radius: 12px;
    overflow: hidden;
    z-index: 10;
}

.suggestions div {
    padding: 10px 12px;
    cursor: pointer;
    font-size: 16px;
    display: flex;
    justify-content: space-between;
}

.suggestions div.active,
.suggestions div:hover {
    background: #2c2c2c;
}

/* =========================
   CORE CONTAINERS
========================= */
.shared-box {
    width: var(--ui-width);
    background: #121212;
    border: 1px solid #2a2a2a;
    border-radius: 14px;
    padding: 14px 16px;

    box-shadow: 0 0 0 1px rgba(255,255,255,0.03);
}

.result {
    width: var(--ui-width);
}

/* =========================
   SHARED / CLASS SUGGESTIONS
========================= */
.shared-title {
    font-weight: 700;
    margin-bottom: 10px;
    font-size: 20px;
    letter-spacing: 0.3px;
}

.shared-item {
    margin: 4px 0;
    font-size: 18px;

    display: flex;
    justify-content: space-between;

    padding: 6px 8px;
    border-radius: 8px;

    background: rgba(255,255,255,0.02);
}

.shared-item span.score {
    opacity: 0.7;
    font-size: 16px;
}

/* =========================
   BRAWLER ROWS
========================= */
.row {
    display: grid;
    grid-template-columns: 180px 1fr;
    gap: 14px;

    padding: 12px 14px;
    margin-bottom: 10px;

    background: #151515;
    border: 1px solid #242424;
    border-radius: 12px;

    align-items: start;
}

.name {
    font-weight: 700;
    font-size: 22px;
    color: #ffffff;

    display: flex;
    gap: 6px;
    align-items: baseline;
}

.list {
    font-size: 18px;
    line-height: 1.6;
    color: rgba(255,255,255,0.9);
}

/* =========================
   CLASS COLORS
========================= */
.thrower { color: #FFA500; }
.tank { color: #FF0000; }
.assassin { color: #00cc66; }
.antitank { color: #aaaaaa; }
.support { color: #bb66ff; }
.sniper { color: #ffff66; }
.control { color: #4da6ff; }
</style>
</head>

const classOrder = [
	  "antitank",
	  "sniper",
	  "assassin",
	  "thrower",
	  "tank",
	  "control",
	  "support",	  
	];
	
const classCounters = {
  tank: { assassin: 2, sniper: 1, support: 1 },
  assassin: { thrower: 2, sniper: 2 },
  antitank: { tank: 2, assassin: 2, support: 1 },
  thrower: { antitank: 2, sniper: 1, tank: 1 },

 let selectedIndex = -1;

/* =========================
   HELPERS
========================= */
function normalize(s) {
    return (s || "").toLowerCase().replace(/\s+/g, " ").trim();
}

function capitalize(w) {
    return w.charAt(0).toUpperCase() + w.slice(1);
}

function getClass(name) {
    return brawlerClass[normalize(name)] || null;
}

function colorize(name) {
    const cls = getClass(name);
    return `<span class="${cls}">${capitalize(name)}</span>`;
}

/* =========================
   SCORING (NO FREQUENCY)
========================= */
function getClassScore(attackerClass, defenderClass) {
    if (!attackerClass || !defenderClass) return 0;
    return (classCounters[attackerClass] || {})[defenderClass] || 0;
}

function computeScore(candidate, selectedList) {
    const cClass = getClass(candidate);
    let score = 0;

    selectedList.forEach(sel => {
        const sClass = getClass(sel);

        const forward = getClassScore(cClass, sClass);
        const reverse = getClassScore(sClass, cClass);

        score += (forward - reverse);
    });

    return score;
}

/* =========================
   CLASS SCORES (NORMALIZED)
========================= */
function computeClassScores(scoreMap) {
    const classScores = {};
    const classCounts = {};

    Object.keys(scoreMap).forEach(name => {
        const cls = getClass(name);
        if (!cls) return;

        if (!classScores[cls]) {
            classScores[cls] = 0;
            classCounts[cls] = 0;
        }

        classScores[cls] += scoreMap[name].score;
        classCounts[cls] += 1;
    });

    Object.keys(classScores).forEach(cls => {
        classScores[cls] = classScores[cls] / classCounts[cls];
    });

    return classScores;
}

/* =========================
   AUTOCOMPLETE
========================= */
function showSuggestions() {
    const input = document.getElementById("input");
    const box = document.getElementById("suggestions");

    const current = normalize(input.value.split(",").pop());

    box.innerHTML = "";
    selectedIndex = -1;

    if (!current) return;

    const matches = Object.keys(data)
        .filter(n => n.startsWith(current))
        .sort()
        .slice(0, 6);

    matches.forEach(name => {
        const div = document.createElement("div");
        div.innerHTML = colorize(name);
        div.onclick = () => selectSuggestion(name);
        box.appendChild(div);
    });
}

function selectSuggestion(name) {
    const input = document.getElementById("input");

    let parts = input.value.split(",");
    parts[parts.length - 1] = " " + name;

    input.value = parts.join(",").replace(/^ /, "") + ", ";

    document.getElementById("suggestions").innerHTML = "";
    selectedIndex = -1;
}

/* =========================
   KEY HANDLING
========================= */
function handleKeyDown(e) {
    const box = document.getElementById("suggestions");
    const items = box.querySelectorAll("div");

    if (!items.length && e.key === "Enter") {
        findCounters();
        return;
    }

    if (e.key === "ArrowDown") {
        selectedIndex = (selectedIndex + 1) % items.length;
        updateActive(items);
        e.preventDefault();
    }

    if (e.key === "ArrowUp") {
        selectedIndex = (selectedIndex - 1 + items.length) % items.length;
        updateActive(items);
        e.preventDefault();
    }

    if (e.key === "Enter") {
        e.preventDefault();

        const chosen =
            selectedIndex >= 0
                ? items[selectedIndex].textContent.toLowerCase()
                : items[0].textContent.toLowerCase();

        selectSuggestion(chosen);
    }
}

function updateActive(items) {
    items.forEach((el, i) => {
        el.classList.toggle("active", i === selectedIndex);
    });
}

/* =========================
   SORTING
========================= */
function sortByClassThenAlpha(arr) {
    return [...arr].sort((a, b) => {
        const classA = getClass(a);
        const classB = getClass(b);

        const indexA = classOrder.indexOf(classA);
        const indexB = classOrder.indexOf(classB);

        if (indexA !== indexB) return indexA - indexB;
        return a.localeCompare(b);
    });
}

/* =========================
   MAIN LOGIC
========================= */
function findCounters() {
    document.getElementById("topUI").style.display = "none";

    const inputRaw = document.getElementById("input").value;
    const resultDiv = document.getElementById("result");
    const counterBox = document.getElementById("shared");
    const classBox = document.getElementById("classScore");

    resultDiv.innerHTML = "";
    counterBox.innerHTML = "";
    counterBox.style.display = "none";

    const brawlers = inputRaw
        .split(",")
        .map(b => normalize(b))
        .filter(Boolean);

    const selectedSet = new Set(brawlers);

    let allCounters = [];

    for (const b of brawlers) {
        if (data[b]) {
            allCounters.push(
                ...(data[b].main || []),
                ...(data[b].alt || [])
            );
        }
    }

    /* =========================
       SCORE MAP (NO FREQUENCY MULTIPLIER)
    ========================= */
    const scoreMap = {};

    allCounters.forEach(c => {
        const key = normalize(c);

        if (!scoreMap[key]) {
            scoreMap[key] = { freq: 0, score: 0 };
        }

        scoreMap[key].freq++;
    });

    Object.keys(scoreMap).forEach(key => {
        scoreMap[key].score = computeScore(
            key,
            brawlers
        );
    });

    /* =========================
       CLASS SCORES (NORMALIZED)
    ========================= */
    const classScores = computeClassScores(scoreMap);

    const sortedClasses = Object.keys(classScores).sort((a, b) => {
        return classScores[b] - classScores[a];
    });

    classBox.innerHTML = `
        <div class="shared-title">Best Classes</div>
        ${sortedClasses.map(cls => {
            const val = classScores[cls];

            return `<div class="shared-item">
                <span class="${cls}">${capitalize(cls)}</span>
                <span class="score">${val >= 0 ? "+" : ""}${val}</span>
            </div>`;
        }).join("")}
    `;

    /* =========================
       SORT PICKS
    ========================= */
    const counterList = Object.keys(scoreMap).sort((a, b) => {
        if (scoreMap[b].score !== scoreMap[a].score) {
            return scoreMap[b].score - scoreMap[a].score;
        }

        if (scoreMap[b].freq !== scoreMap[a].freq) {
            return scoreMap[b].freq - scoreMap[a].freq;
        }

        const classA = getClass(a);
        const classB = getClass(b);

        const indexA = classOrder.indexOf(classA);
        const indexB = classOrder.indexOf(classB);

        if (indexA !== indexB) return indexA - indexB;

        return a.localeCompare(b);
    });

    const filteredCounters = counterList.filter(c => scoreMap[c].freq >= 2);

    /* =========================
       BEST PICKS BOX
    ========================= */
    if (counterList.length) {
        counterBox.style.display = "block";

        counterBox.innerHTML = `
            <div class="shared-title">Best Brawlers</div>
            ${filteredCounters.map(c => {
                const isCrossed = selectedSet.has(c);

                return `<div class="shared-item">
                    ${isCrossed ? `<s>${colorize(c)}</s>` : colorize(c)}
                    <span class="score">(score ${scoreMap[c].score} | x${scoreMap[c].freq})</span>
                </div>`;
            }).join("")}
        `;
    }

    /* =========================
       ORIGINAL DISPLAY
    ========================= */
    brawlers.forEach(b => {
        if (!data[b]) {
            resultDiv.innerHTML += `
            <div class="row">
                <div class="name">${capitalize(b)}</div>
                <div class="list">Not found</div>
            </div>`;
            return;
        }

        const main = sortByClassThenAlpha(data[b].main || []).map(colorize).join(", ");
        const alt = sortByClassThenAlpha(data[b].alt || []).map(colorize).join(", ");

        resultDiv.innerHTML += `
        <div class="row">
            <div class="name">${colorize(b)}</div>
            <div class="list">${main || "None"} / ${alt || "None"}</div>
        </div>`;
    });
}

/* =========================
   INIT
========================= */
window.addEventListener("load", () => {
    document.getElementById("input").focus();
});

</script>
