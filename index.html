<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Brawl Stars Draft</title>

<style>
body {
    margin: 0;
    font-family: system-ui, Arial;
    background: radial-gradient(circle at top, #1a1a1a, #0d0d0d);
    color: #fff;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 50px 20px;
}

h1 { margin-bottom: 6px; }
p { opacity: 0.7; margin-bottom: 25px; }

.autocomplete-box {
    position: relative;
    width: 360px;
}

input {
    width: 100%;
    padding: 12px;
    border-radius: 10px;
    border: 1px solid #333;
    background: #151515;
    color: white;
    outline: none;
}

button {
    margin-top: 12px;
    padding: 10px 18px;
    border-radius: 10px;
    border: none;
    background: #2a2a2a;
    color: white;
    cursor: pointer;
}

.suggestions {
    position: absolute;
    top: 44px;
    width: 100%;
    background: #1a1a1a;
    border: 1px solid #333;
    border-radius: 10px;
    overflow: hidden;
    z-index: 10;
}

.suggestions div {
    padding: 10px;
    cursor: pointer;
}

.suggestions div.active,
.suggestions div:hover {
    background: #2c2c2c;
}

.shared-box {
    margin-top: 25px;
    width: 100%;
    max-width: 700px;
    background: #111;
    border: 1px solid #222;
    border-radius: 12px;
    padding: 14px;
}

.shared-title {
    font-weight: 700;
    margin-bottom: 10px;
    color: #00ff88;
}

.strength-title {
    color: #ff4d4d;
}

.shared-item {
    font-size: 14px;
    padding: 4px 0;
}

.result {
    margin-top: 20px;
    width: 100%;
    max-width: 700px;
}

.row {
    display: grid;
    grid-template-columns: 160px 1fr;
    gap: 15px;
    padding: 12px 14px;
    margin-bottom: 10px;
    background: #151515;
    border: 1px solid #222;
    border-radius: 12px;
}

.name {
    font-weight: 700;
}

.list {
    font-size: 14px;
    line-height: 1.6;
}
</style>
</head>

<body>

    <input id="input"
           placeholder="Brawler Name"

           onkeydown="handleKeyDown(event)">
    <div id="suggestions" class="suggestions"></div>
</div>

<button onclick="findCounters()">Search</button>

<div id="shared" class="shared-box" style="display:none;"></div>
<div id="strength" class="shared-box" style="display:none;"></div>
<div class="result" id="result"></div>

const allNames = Object.keys(data);
let selectedIndex = -1;

/* ===== AUTOCOMPLETE ===== */
function showSuggestions() {
    const input = document.getElementById("input");
    const box = document.getElementById("suggestions");

    const parts = input.value.toLowerCase().split(",");
    const current = parts[parts.length - 1].trim();

    box.innerHTML = "";
    selectedIndex = -1;

    if (!current) return;

    const matches = allNames
        .filter(n => n.toLowerCase().includes(current))
        .slice(0, 6);

    matches.forEach(name => {
        const div = document.createElement("div");
        div.textContent = capitalize(name);
        div.onclick = () => selectSuggestion(name);
        box.appendChild(div);
    });
}

/* ===== KEYBOARD ===== */
function handleKeyDown(e) {
    const box = document.getElementById("suggestions");
    const items = box.querySelectorAll("div");
    const open = items.length > 0;

    if (e.key === "ArrowDown") {
        if (!open) return;
        selectedIndex = (selectedIndex + 1) % items.length;
        updateActive(items);
        e.preventDefault();
        return;
    }

    if (e.key === "ArrowUp") {
        if (!open) return;
        selectedIndex = (selectedIndex - 1 + items.length) % items.length;
        updateActive(items);
        e.preventDefault();
        return;
    }

    if (e.key === "Enter") {
        const input = document.getElementById("input");

        if (open) {
            let chosen = (selectedIndex >= 0)
                ? items[selectedIndex].textContent.toLowerCase()
                : items[0].textContent.toLowerCase();

            let parts = input.value.split(",");
            parts[parts.length - 1] = " " + chosen;

            input.value = parts.join(",").replace(/^ /, "") + ", ";

            box.innerHTML = "";
            selectedIndex = -1;

            e.preventDefault();
            return;
        }

        findCounters();
        e.preventDefault();
    }
}

function updateActive(items) {
    items.forEach((el, i) => {
        el.classList.toggle("active", i === selectedIndex);
    });
}

/* ===== SELECT ===== */
function selectSuggestion(name) {
    const input = document.getElementById("input");

    let parts = input.value.split(",");
    parts[parts.length - 1] = " " + name;

    input.value = parts.join(",").replace(/^ /, "") + ", ";

    document.getElementById("suggestions").innerHTML = "";
}

/* ===== MAIN LOGIC ===== */
function findCounters() {
    const input = document.getElementById("input").value.toLowerCase();
    const resultDiv = document.getElementById("result");
    const counterBox = document.getElementById("shared");
    const strengthBox = document.getElementById("strength");

    resultDiv.innerHTML = "";
    counterBox.innerHTML = "";
    strengthBox.innerHTML = "";
    counterBox.style.display = "none";
    strengthBox.style.display = "none";

    const brawlers = input
        .split(",")
        .map(b => b.trim())
        .filter(Boolean);

    let allCounters = [];
    let allStrengths = [];

    /* COUNTERS */
    brawlers.forEach(b => {
        if (data[b]) {
            allCounters.push([...data[b].main, ...data[b].alt]);
        }
    });

    /* STRENGTHS (reverse lookup) */
    Object.keys(data).forEach(enemy => {
        const counters = [...data[enemy].main, ...data[enemy].alt];

        brawlers.forEach(b => {
            if (counters.includes(b)) {
                allStrengths.push(enemy);
            }
        });
    });

    /* COUNT */
    function getFreq(arr) {
        let freq = {};
        arr.forEach(c => {
            freq[c] = (freq[c] || 0) + 1;
        });
        return freq;
    }

    const counterFreq = getFreq(allCounters.flat());
    const strengthFreq = getFreq(allStrengths);

    /* DISPLAY COUNTERS */
    let counterList = Object.keys(counterFreq)
        .filter(k => counterFreq[k] >= 2)
        .sort((a, b) => counterFreq[b] - counterFreq[a]);

    if (counterList.length) {
        counterBox.style.display = "block";
        counterBox.innerHTML = `
            <div class="shared-title">Counters</div>
            ${counterList.map(c => `<div class="shared-item">${c} (x${counterFreq[c]})</div>`).join("")}
        `;
    }

    /* DISPLAY STRENGTH */
    let strengthList = Object.keys(strengthFreq)
        .filter(k => strengthFreq[k] >= 2)
        .sort((a, b) => strengthFreq[b] - strengthFreq[a]);

    if (strengthList.length) {
        strengthBox.style.display = "block";
        strengthBox.innerHTML = `
            <div class="shared-title strength-title">Strengths</div>
            ${strengthList.map(c => `<div class="shared-item">${c} (x${strengthFreq[c]})</div>`).join("")}
        `;
    }

    /* RESULTS */
    brawlers.forEach(b => {
        if (!data[b]) {
            resultDiv.innerHTML += `
                <div class="row">
                    <div class="name">${capitalize(b)}</div>
                    <div class="list">Not found</div>
                </div>
            `;
            return;
        }

        const main = data[b].main.join(", ");
        const alt = data[b].alt.join(", ");

        resultDiv.innerHTML += `
            <div class="row">
                <div class="name">${capitalize(b)}</div>
                <div class="list">
                    ${main || "None"} / ${alt || "None"}
                </div>
            </div>
        `;
    });
}

/* ===== HELPERS ===== */
function capitalize(w) {
    return w.charAt(0).toUpperCase() + w.slice(1);
}

</script>
